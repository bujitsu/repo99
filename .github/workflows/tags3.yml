name: Tagger

on:
  workflow_dispatch:
  # push:
  #   branches: [ main, development ]

permissions:
  contents: write

jobs:
  tag:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # -------------------------------
      # MAIN BRANCH → SEMVER
      # -------------------------------
      - name: Get latest tag
        if: github.ref == 'refs/heads/main'
        id: last_tag
        run: |
          TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.0.0")
          echo "tag=$TAG" >> $GITHUB_OUTPUT

      - name: Determine bump type
        if: github.ref == 'refs/heads/main'
        id: bump_type
        run: |
          MSG=$(git log -1 --pretty=%B)

          if [[ "$MSG" == *"BREAKING CHANGE"* ]]; then
            echo "type=major" >> $GITHUB_OUTPUT
          elif [[ "$MSG" == feat:* ]]; then
            echo "type=minor" >> $GITHUB_OUTPUT
          else
            echo "type=patch" >> $GITHUB_OUTPUT
          fi

      - name: Bump version
        if: github.ref == 'refs/heads/main'
        id: bump
        run: |
          TAG=${{ steps.last_tag.outputs.tag }}
          VERSION=${TAG#v}

          IFS='.' read -r MAJOR MINOR PATCH <<< "$VERSION"

          case "${{ steps.bump_type.outputs.type }}" in
            major)
              MAJOR=$((MAJOR + 1))
              MINOR=0
              PATCH=0
              ;;
            minor)
              MINOR=$((MINOR + 1))
              PATCH=0
              ;;
            patch)
              PATCH=$((PATCH + 1))
              ;;
          esac

          NEW_TAG="v$MAJOR.$MINOR.$PATCH"
          echo "new_tag=$NEW_TAG" >> $GITHUB_OUTPUT

      # -------------------------------
      # DEVELOPMENT BRANCH → SHA TAG
      # -------------------------------
      - name: Generate SHA tag
        if: github.ref == 'refs/heads/development'
        id: sha_tag
        run: |
          SHORT_SHA=$(git rev-parse --short=7 HEAD)
          echo "new_tag=$SHORT_SHA" >> $GITHUB_OUTPUT

      # -------------------------------
      # CREATE & PUSH TAG
      # -------------------------------
      - name: Create and push tag
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"

          if [[ "${GITHUB_REF}" == "refs/heads/main" ]]; then
            TAG="${{ steps.bump.outputs.new_tag }}"
          elif [[ "${GITHUB_REF}" == "refs/heads/development" ]]; then
            TAG="${{ steps.sha_tag.outputs.new_tag }}"
          fi

          echo "Creating tag: $TAG"
          git tag $TAG
          git push origin $TAG

        
      - name: Create GitHub Release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ github.ref == 'refs/heads/main' && steps.bump.outputs.new_tag || steps.sha_tag.outputs.new_tag }}
          release_name: ${{ github.ref == 'refs/heads/main' && format('Release {0}', steps.bump.outputs.new_tag) || format('Dev {0}', steps.sha_tag.outputs.new_tag) }}
          generate_release_notes: true
          prerelease: ${{ github.ref == 'refs/heads/development' }}